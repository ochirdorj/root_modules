name: bootstrap_dev

on:
  push:
    branches:
      - main
    paths:
      - 'dev/bootstrap/**'
      - '.github/workflows/bootstrap_dev.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'dev/bootstrap/**'
      - '.github/workflows/bootstrap_dev.yml'
  workflow_dispatch:

concurrency:
  group: bootstrap_dev
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform-dev.yml
    with:
      working_directory: dev/bootstrap
      tf_version: '1.13.0'
      skip_check: 'CKV_AWS_119,CKV_AWS_28'
    secrets: inherit