name: logging_dev

on:
  push:
    branches:
      - main
    paths:
      - 'dev/logging/**'
      - '.github/workflows/logging_dev.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'dev/logging/**'
      - '.github/workflows/logging_dev.yml'
  workflow_dispatch:
    inputs:
      destroy:
        description: 'Destroy resources?'
        required: true
        type: boolean
        default: false
  schedule:
    - cron: '20 4 * * *'    # destroy 11:20pm CDT
    - cron: '20 14 * * *'   # recreate 9:20am CDT

concurrency:
  group: logging_dev
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform-dev.yml
    with:
      working_directory: dev/logging
      tf_version: '1.13.0'
      skip_check: 'CKV_AWS_338,CKV_AWS_158'
      destroy: >-
        ${{
          github.event.inputs.destroy == 'true' ||
          (github.event_name == 'schedule' &&
          github.event.schedule == '20 4 * * *')
        }}
    secrets: inherit