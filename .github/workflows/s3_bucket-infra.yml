name: s3_bucket_infra
on:
  push:
    branches:
      - main
    paths:
      - 'infra/s3_bucket/**'
      - '.github/workflows/s3_bucket_infra.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/s3_bucket/**'
      - '.github/workflows/s3_bucket_infra.yml'
  workflow_dispatch:

concurrency:
  group: s3_bucket_infra
  cancel-in-progress: false

permissions:       
  contents: read
  pull-requests: write
  id-token: write

jobs:
  terraform:
    uses: ./.github/workflows/terraform-infra.yml
    with:
      working_directory: infra/s3_bucket
      tf_version: '1.13.0'
      skip_check: 'CKV2_AWS_62,CKV_AWS_145,CKV_AWS_144,CKV_AWS_19,CKV_AWS_28'
    secrets: inherit