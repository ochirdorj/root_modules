name: s3_bucket
on:
  push:
    branches:
      - main
    paths:
      - 's3_bucket/**'
      - '.github/workflows/s3_bucket.yaml'
  pull_request:
    branches:
      - main
    paths:
      - 's3_bucket/**'
      - '.github/workflows/s3_bucket.yaml'
  workflow_dispatch:
concurrency:
  group: s3_bucket
  cancel-in-progress: true
env:
  TF_Version: 1.13.0
  TF_Working_Dir: s3_bucket
  TF_LOG: 'WARN'
  TF_INPUT: 'false'
  TF_IN_AUTOMATION: 'true'

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
    security-scan:
        name: Check for vulnerabilities in Terraform code
        runs-on: ubuntu-latest
        steps:
          - name: Checkout code
            uses: actions/checkout@v5
          - name: Run tfsec
            uses: aquasecurity/tfsec-action@v1.0.3
            with:
              working_directory: ${{ env.TF_Working_Dir }}
              github_token: ${{ secrets.GITHUB_TOKEN }}
              soft_fail: false
    
          - name: Run Checkov
            uses: bridgecrewio/checkov-action@v12
            with:
              directory: ${{ env.TF_Working_Dir }}
              framework: terraform
              soft_fail: false
              skip_check: CKV2_AWS_62,CKV_AWS_145,CKV_AWS_144,CKV_AWS_19

    validate:
        name: Validate and Lint
        runs-on: ubuntu-latest
        needs: security-scan
        steps:
          - name: Checkout code
            uses: actions/checkout@v5

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v4
            with:
              terraform_version: ${{ env.TF_Version }}
              terraform_wrapper: true

          - name: Cache Terraform plugins
            uses: actions/cache@v5
            with:
              path: |
                ~/.terraform.d/plugin-cache
                ${{ env.TF_Working_Dir }}/.terraform
              key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
              restore-keys: |
                terraform-${{ runner.os }}-
          
          - name: Configure AWS Credentials   # ← add this
            uses: aws-actions/configure-aws-credentials@v5
            with:
              role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
              aws-region: ${{ secrets.AWS_REGION }}
              role-session-name: GitHubActions-TerraformValidate
          
          - name: Terraform Format check
            id: fmt
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform fmt -recursive -diff

          - name: Terraform Init
            id: init
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform init -upgrade
          
          - name: Terraform Validate
            id: validate
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform validate -no-color

          - name: Run Lint
            uses: terraform-linters/setup-tflint@v4
            with:
              tflint_version: latest

          - name: TFLint init & run
            working-directory: ${{ env.TF_Working_Dir }}
            run: |
              tflint --init
              tflint --recursive --format=compact

    plan:
        name: Terraform Plan
        runs-on: ubuntu-latest
        needs: validate
        steps:
          - name: Checkout code
            uses: actions/checkout@v5

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v4
            with:
              terraform_version: ${{ env.TF_Version }}
              terraform_wrapper: true

          - name: Cache Terraform plugins
            uses: actions/cache@v5
            with:
              path: |
                ~/.terraform.d/plugin-cache
                ${{ env.TF_Working_Dir }}/.terraform
              key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
              restore-keys: |
                terraform-${{ runner.os }}-

          - name: Configure AWS Credentials (Prod)
            uses: aws-actions/configure-aws-credentials@v5
            with:
              role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
              aws-region: ${{ secrets.AWS_REGION }}
              role-session-name: GitHubActions-TerraformPlan

          - name: Terraform Init
            id: init
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform init -upgrade -reconfigure
            env:
              TF_VAR_environment: prod

          - name: Terraform Plan
            id: plan
            working-directory: ${{ env.TF_Working_Dir }}
            run: |
              terraform plan \
                -out=prod.tfplan \
                -no-color \
                -detailed-exitcode 2>&1 | tee plan_output.txt
              echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
            continue-on-error: true

          - name: Upload Plan Artifact
            uses: actions/upload-artifact@v4
            with:
              name: prod-tfplan
              path: ${{ env.TF_Working_Dir }}/prod.tfplan
              retention-days: 5

          - name: Post Plan to PR
            uses: actions/github-script@v7
            if: github.event_name == 'pull_request'
            with:
              github-token: ${{ secrets.GITHUB_TOKEN }}
              script: |
                const fs = require('fs');
                const planOutput = fs.readFileSync('${{ env.TF_Working_Dir }}/plan_output.txt', 'utf8');
                const truncated = planOutput.length > 60000 ? planOutput.substring(0, 60000) + '\n... output truncated' : planOutput;
                const body = `## Terraform Plan — \`prod\`
                <details><summary>Show Plan</summary>

                \`\`\`hcl
                ${truncated}
                \`\`\`
                </details>

                > Plan exit code: \`${{ steps.plan.outputs.exitcode }}\``;
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body
                });

          - name: Fail on Plan Error
            if: steps.plan.outputs.exitcode == '1'
            run: exit 1

    apply:
        name: Terraform Apply (Prod)
        runs-on: ubuntu-latest
        needs: plan
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        environment:
          name: prod
          url: https://console.aws.amazon.com
        steps:
          - name: Checkout code
            uses: actions/checkout@v5

          - name: Setup Terraform
            uses: hashicorp/setup-terraform@v4
            with:
              terraform_version: ${{ env.TF_Version }}
              terraform_wrapper: true

          - name: Cache Terraform plugins
            uses: actions/cache@v5
            with:
              path: |
                ~/.terraform.d/plugin-cache
                ${{ env.TF_Working_Dir }}/.terraform
              key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
              restore-keys: |
                terraform-${{ runner.os }}-

          - name: Configure AWS Credentials (Prod)
            uses: aws-actions/configure-aws-credentials@v5
            with:
              role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
              aws-region: ${{ secrets.AWS_REGION }}
              role-session-name: GitHubActions-TerraformApply

          - name: Terraform Init
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform init -upgrade -reconfigure
            env:
              TF_VAR_environment: prod

          - name: Download Plan Artifact
            uses: actions/download-artifact@v4
            with:
              name: prod-tfplan
              path: ${{ env.TF_Working_Dir }}

          - name: Terraform Apply
            working-directory: ${{ env.TF_Working_Dir }}
            run: terraform apply -auto-approve -no-color prod.tfplan
            env:
              TF_VAR_environment: prod

          - name: Post Apply Summary
            if: always()
            run: |
              echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
              echo "- **Environment:** prod" >> $GITHUB_STEP_SUMMARY
              echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
              echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
              echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY