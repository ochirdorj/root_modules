name: self_hosted_runner

on:
  push:
    branches:
      - main
    paths:
      - 'self_hosted_runner/**'
      - '.github/workflows/self_hosted_runner.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'self_hosted_runner/**'
      - '.github/workflows/self_hosted_runner.yml'
  workflow_dispatch:

concurrency:
  group: self_hosted_runner
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # -------------------------------------------------------
  # Job 1 - Build Lambda zip
  # -------------------------------------------------------
  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: self_hosted_runner/lambda_code_folder
        run: npm install --production

      - name: Zip lambda package
        working-directory: self_hosted_runner/lambda_code_folder
        run: zip -r ../function.zip .

      - name: Upload lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-zip
          path: self_hosted_runner/function.zip
          retention-days: 1

  # -------------------------------------------------------
  # Job 2 - Download zip and cache for terraform job
  # Needed because reusable workflow runs on a fresh runner
  # -------------------------------------------------------
  prep-terraform:
    name: Prepare Terraform workspace
    runs-on: ubuntu-latest
    needs: build-lambda
    steps:
      - name: Download lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-zip
          path: self_hosted_runner/

      - name: Verify zip exists
        run: ls -la self_hosted_runner/function.zip

      - name: Cache zip for terraform job
        uses: actions/cache/save@v4
        with:
          path: self_hosted_runner/function.zip
          key: lambda-zip-${{ github.sha }}

  # -------------------------------------------------------
  # Job 3 - Terraform (reusable workflow)
  # -------------------------------------------------------
  terraform:
    name: Terraform
    needs: prep-terraform
    uses: ./.github/workflows/terraform.yml
    with:
      working_directory: self_hosted_runner
      tf_version: '1.13.0'
      skip_check: 'CKV2_AWS_62,CKV_AWS_145,CKV_AWS_144,CKV_AWS_19'
    secrets: inherit