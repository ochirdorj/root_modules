name: self_hosted_runner

on:
  push:
    branches:
      - main
    paths:
      - 'self_hosted_runner/**'
      - '.github/workflows/self_hosted_runner.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'self_hosted_runner/**'
      - '.github/workflows/self_hosted_runner.yml'
  workflow_dispatch:

concurrency:
  group: self_hosted_runner
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  # -------------------------------------------------------
  # Job 1 - Build Lambda zip
  # -------------------------------------------------------
  build-lambda:
    name: Build Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f  # v6.3.0
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: self_hosted_runner/lambda_code_folder
        run: npm install --omit=dev

      - name: Zip lambda package
        working-directory: self_hosted_runner/lambda_code_folder
        run: zip -r ../function.zip .

      - name: Zip webhook validator
        working-directory: self_hosted_runner/webhook_validator
        run: zip ../webhook_validator.zip index.js

      - name: Upload lambda artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: lambda-zips
          path: |
            self_hosted_runner/function.zip
            self_hosted_runner/webhook_validator.zip
          retention-days: 1

  # -------------------------------------------------------
  # Job 2 - Download zip and cache for terraform job
  # Needed because reusable workflow runs on a fresh runner
  # -------------------------------------------------------
  prep-terraform:
    name: Prepare Terraform workspace
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-lambda
    steps:
      - name: Download lambda artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: lambda-zips
          path: self_hosted_runner/

      - name: Verify zips exist
        run: ls -la self_hosted_runner/function.zip self_hosted_runner/webhook_validator.zip

      - name: Cache zips for terraform job
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            self_hosted_runner/function.zip
            self_hosted_runner/webhook_validator.zip
          key: lambda-zip-${{ github.sha }}

  # -------------------------------------------------------
  # Job 3 - Terraform (reusable workflow)
  # -------------------------------------------------------
  terraform:
    name: Terraform
    needs: prep-terraform
    uses: ./.github/workflows/terraform.yml
    with:
      working_directory: self_hosted_runner
      tf_version: '1.13.0'
      skip_check: 'CKV2_AWS_62,CKV_AWS_145,CKV_AWS_144,CKV_AWS_19'
    secrets: inherit
