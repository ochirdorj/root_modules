name: Terraform Reusable Workflow

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Terraform working directory"
        required: true
        type: string
      tf_version:
        description: "Terraform version"
        required: false
        type: string
        default: '1.13.0'
      skip_check:
        description: "Checkov checks to skip"
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  security-scan:
    name: Check for vulnerabilities in Terraform code
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ inputs.working_directory }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          soft_fail: false

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ inputs.working_directory }}
          framework: terraform
          soft_fail: false
          skip_check: ${{ inputs.skip_check }}

  validate:
    name: Validate and Lint
    runs-on: [self-hosted, linux, x64]
    needs: security-scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Restore Lambda zip cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.working_directory }}/function.zip
          key: lambda-zip-${{ github.sha }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: true

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ inputs.working_directory }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformValidate

      - name: Terraform Format check
        id: fmt
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -recursive -diff

      - name: Terraform Init
        id: init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -upgrade -reconfigure

      - name: Terraform Validate
        id: validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate -no-color

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: TFLint init & run
        working-directory: ${{ inputs.working_directory }}
        run: |
          tflint --init
          tflint --recursive --format=compact

  plan:
    name: Terraform Plan
    runs-on: [self-hosted, linux, x64]
    needs: validate
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Restore Lambda zip cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.working_directory }}/function.zip
          key: lambda-zip-${{ github.sha }}
        continue-on-error: true 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: true

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ inputs.working_directory }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformPlan

      - name: Terraform Init
        id: init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -upgrade -reconfigure

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform plan \
            -out=prod.tfplan \
            -no-color \
            -detailed-exitcode 2>&1 | tee plan_output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs.working_directory }}-tfplan
          path: ${{ inputs.working_directory }}/prod.tfplan
          retention-days: 5

      - name: Post Plan to PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000 ? planOutput.substring(0, 60000) + '\n... output truncated' : planOutput;
            const body = `## Terraform Plan — \`${{ inputs.working_directory }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            > Plan exit code: \`${{ steps.plan.outputs.exitcode }}\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail on Plan Error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  apply:
    name: Terraform Apply (Prod)
    runs-on: [self-hosted, linux, x64]
    needs: plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: prod
      url: https://console.aws.amazon.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Restore Lambda zip cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ inputs.working_directory }}/function.zip
          key: lambda-zip-${{ github.sha }}
        continue-on-error: true   # silently skips for vpc, s3, scp workflows
        
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ inputs.tf_version }}
          terraform_wrapper: true

      - name: Cache Terraform plugins
        uses: actions/cache@v5
        with:
          path: |
            ~/.terraform.d/plugin-cache
            ${{ inputs.working_directory }}/.terraform
          key: terraform-${{ runner.os }}-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            terraform-${{ runner.os }}-

      - name: Configure AWS Credentials (Prod)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_PROD_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: GitHubActions-TerraformApply

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -upgrade -reconfigure

      - name: Download Plan Artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ inputs.working_directory }}-tfplan
          path: ${{ inputs.working_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve -no-color prod.tfplan

      - name: Post Apply Summary
        if: always()
        run: |
          echo "## Terraform Apply Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Module:** ${{ inputs.working_directory }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** prod" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY