name: vpc_dev_destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: 'Type DESTROY to confirm'
        required: true
        type: string

concurrency:
  group: vpc_dev
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  validate_input:
    runs-on: ubuntu-latest
    steps:
      - name: check confirmation
        if: github.event.inputs.confirm_destroy != 'DESTROY'
        run: |
          echo "You must type DESTROY to confirm"
          exit 1

  terraform:
    needs: validate_input
    uses: ./.github/workflows/terraform-dev.yml
    with:
      working_directory: dev/vpc
      tf_version: '1.13.0'
      destroy: true
    secrets: inherit